name: new_minicab_driver
description: A new Flutter project.
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  auto_size_text: 3.0.0
  cached_network_image: ^3.3.0
  dropdown_button2: 2.3.9
  flutter_overlay_window: ^0.5.0
  floating_bottom_navigation_bar: 1.5.2
  flutter_animate: ^4.5.2
  flutter_cache_manager: ^3.4.1
  font_awesome_flutter: 10.6.0
  from_css_color: 2.0.0
  go_router: 7.1.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  json_path: ^0.9.0
  page_transition: ^2.2.2
  path_provider: ^2.1.5
  pin_code_fields: 8.0.1
  provider: ^6.1.5+1
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  sign_in_with_apple: ^8.0.0
  sqflite: ^2.4.2+1
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  geocoding: ^4.0.0
  intl_phone_field: ^3.2.0
  geolocator: ^14.0.2
  latlong2: ^0.10.1
  fluttertoast: ^9.1.0
  image_picker: ^1.1.2
  flutter_blurhash: ^0.9.1
  fl_location: ^5.0.0
  http: ^1.2.1
  pdf: ^3.10.7
  open_file: ^3.5.5
  flutter_tts: ^4.2.5
  flutter_datetime_picker: ^1.5.1
  toggle_switch: ^2.1.0
  flutter_swipe_button: ^2.1.3
  glowy_borders: ^1.0.2
  flutter_ringtone_player: ^4.0.0+4
  vibration: ^3.1.8
  flutter_local_notifications: 17.2.4
  flutter_background_service: ^5.1.0
  stop_watch_timer: ^3.1.1
  pusher_client_fixed: ^0.0.5
  get: ^4.6.6
  audioplayers: ^6.0.0
  flutter_widget_from_html_core: ^0.17.2
  location: ^8.0.1
  dio: ^5.8.0+1
  mapbox_maps_flutter: ^2.24.2

dependency_overrides:
  image_picker_android: ^0.8.12+15
  shared_preferences_android: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: 'assets/driver-app-icon.jpg'

flutter:
  uses-material-design: true

  assets:
    - assets/driver-app-icon.jpg
    - assets/fonts/
    - assets/images/
    - assets/images/pngwing.com.png
    - assets/videos/
    - assets/audios/
    - assets/audios/beep.mp3
    - assets/lottie_animations/
    - assets/rive_animations/
    - assets/pdfs/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
